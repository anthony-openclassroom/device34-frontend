name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write
  checks: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # ─── Angular ────────────────────────────────────────────────────────────────

  test-angular:
    name: Tests Angular
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: angular-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: angular-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Angular Tests
          path: reports/*.xml
          reporter: java-junit

  # ─── SonarCloud ─────────────────────────────────────────────────────────────

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test-angular
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: angular-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: angular-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─── Build Docker ────────────────────────────────────────────────────────────

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test-angular
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── Release ────────────────────────────────────────────────────────────────

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag Docker image with semantic version
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
          # GH_TOKEN déclaré en env: pour éviter l'interpolation directe du secret
          # dans le bloc run (bonne pratique de sécurité, cf. githubactions:S7636)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "${GH_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}
          docker tag  ghcr.io/${{ github.repository }}:sha-${SHORT_SHA} ghcr.io/${{ github.repository }}:${VERSION}
          docker push ghcr.io/${{ github.repository }}:${VERSION}
